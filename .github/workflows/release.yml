name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: |
          GOOS=linux GOARCH=amd64 go build -o chaosrunner-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o chaosrunner-linux-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o chaosrunner-darwin-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -o chaosrunner-darwin-arm64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o chaosrunner-windows-amd64.exe ./cmd
      - uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.${{ github.run_number }}
          files: |
            chaosrunner-linux-amd64
            chaosrunner-linux-arm64
            chaosrunner-darwin-amd64
            chaosrunner-darwin-arm64
            chaosrunner-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
